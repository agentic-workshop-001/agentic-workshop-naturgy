# ============================================================
# Deploy: Upload Frontend to S3
#
# Builds the React/Vite frontend and syncs it to S3.
# Auto-provisions infrastructure if it doesn't exist yet.
# Invalidates CloudFront cache after deploy.
# ============================================================

name: "Deploy: Frontend to S3"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: false
        default: "dev"
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  deploy:
    name: Deploy to S3 + CloudFront
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download build artifact
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: frontend-dist
          path: dist/

      - name: Sanitise AWS region
        id: clean
        run: |
          REGION="$(echo -n "${{ secrets.AWS_REGION }}" | tr -d '[:space:]')"
          echo "::add-mask::$REGION"
          echo "aws_region=$REGION" >> "$GITHUB_OUTPUT"

      - name: Generate repo hash
        id: hash
        run: |
          REPO_HASH=$(echo -n "${{ github.repository }}" | sha256sum | cut -c1-7)
          echo "repo_hash=$REPO_HASH" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@5579c002bb4778aa43395ef1df492868a9a1c83f # v4.0.2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ steps.clean.outputs.aws_region }}
          role-to-assume: arn:aws:iam::223876296831:role/AWS_223876296831_PoC-Naturgy-IA-TDLC
          role-duration-seconds: 3600
          role-skip-session-tagging: true

      - name: Check if S3 bucket exists
        id: check
        env:
          REPO_HASH: ${{ steps.hash.outputs.repo_hash }}
          ENV: ${{ inputs.environment || 'dev' }}
        run: |
          BUCKET="naturgy-gas-frontend-${ENV}-${REPO_HASH}"
          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Bucket $BUCKET not found — will auto-provision infrastructure"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Terraform (if auto-provision needed)
        if: steps.check.outputs.exists == 'false'
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_wrapper: false

      - name: Auto-provision infrastructure
        if: steps.check.outputs.exists == 'false'
        working-directory: terraform/frontend
        env:
          REPO_HASH: ${{ steps.hash.outputs.repo_hash }}
          ENV: ${{ inputs.environment || 'dev' }}
          REGION: ${{ steps.clean.outputs.aws_region }}
        run: |
          terraform init
          terraform plan \
            -var="aws_region=${REGION}" \
            -var="environment=${ENV}" \
            -var="repo_hash=${REPO_HASH}" \
            -out=tfplan
          terraform apply -auto-approve tfplan

      - name: Sync frontend to S3
        env:
          REPO_HASH: ${{ steps.hash.outputs.repo_hash }}
          ENV: ${{ inputs.environment || 'dev' }}
        run: |
          BUCKET="naturgy-gas-frontend-${ENV}-${REPO_HASH}"
          aws s3 sync dist/ "s3://${BUCKET}" --delete
          echo "Uploaded frontend to s3://${BUCKET}"

      - name: Invalidate CloudFront cache
        env:
          REPO_HASH: ${{ steps.hash.outputs.repo_hash }}
        run: |
          CF_COMMENT="Naturgy Gas frontend ${REPO_HASH}"
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='${CF_COMMENT}'].Id" \
            --output text)

          if [ -n "$DIST_ID" ] && [ "$DIST_ID" != "None" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$DIST_ID" \
              --paths "/*"
            echo "Cache invalidation created for distribution $DIST_ID"
          else
            echo "::warning::CloudFront distribution not found — skipping invalidation"
          fi

      - name: Show deploy summary
        env:
          REPO_HASH: ${{ steps.hash.outputs.repo_hash }}
        run: |
          CF_COMMENT="Naturgy Gas frontend ${REPO_HASH}"
          DIST_DOMAIN=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='${CF_COMMENT}'].DomainName" \
            --output text 2>/dev/null || echo "unknown")

          echo "## Frontend Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | ${{ inputs.environment || 'dev' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| S3 Bucket | \`naturgy-gas-frontend-${{ inputs.environment || 'dev' }}-${REPO_HASH}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend URL | https://${DIST_DOMAIN} |" >> "$GITHUB_STEP_SUMMARY"
