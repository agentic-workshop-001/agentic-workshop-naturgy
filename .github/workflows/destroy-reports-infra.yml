# ============================================================
# Destroy: Remove Reports Infrastructure
#
# Tears down S3 bucket, CloudFront distribution, and OAC
# created by the reports Terraform module.
#
# Safety: requires typing "destroy" in the confirmation input.
# ============================================================

name: "Destroy: Remove Reports Infra"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
      confirmation:
        description: "Type 'destroy' to confirm"
        required: true

permissions:
  contents: read

concurrency:
  group: reports-infra
  cancel-in-progress: false

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    if: github.event.inputs.confirmation == 'destroy'

    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Sanitise AWS region
        id: clean
        run: |
          REGION="$(echo -n "${{ secrets.AWS_REGION }}" | tr -d '[:space:]')"
          echo "::add-mask::$REGION"
          echo "aws_region=$REGION" >> "$GITHUB_OUTPUT"

      - name: Generate repo hash
        id: hash
        run: |
          REPO_HASH=$(echo -n "${{ github.repository }}" | sha256sum | cut -c1-7)
          echo "repo_hash=$REPO_HASH" >> "$GITHUB_OUTPUT"
          echo "Repo hash: $REPO_HASH"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@5579c002bb4778aa43395ef1df492868a9a1c83f # v4.0.2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ steps.clean.outputs.aws_region }}
          role-to-assume: arn:aws:iam::223876296831:role/AWS_223876296831_PoC-Naturgy-IA-TDLC
          role-duration-seconds: 3600
          role-skip-session-tagging: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform/reports
        run: terraform init

      - name: Import existing resources into state
        working-directory: terraform/reports
        env:
          REPO_HASH: ${{ steps.hash.outputs.repo_hash }}
          ENV: ${{ inputs.environment }}
        run: |
          set -euo pipefail
          BUCKET="naturgy-gas-reports-${ENV}-${REPO_HASH}"

          # Import S3 bucket if it exists
          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            terraform import \
              -var="aws_region=${{ steps.clean.outputs.aws_region }}" \
              -var="environment=${ENV}" \
              -var="repo_hash=${REPO_HASH}" \
              aws_s3_bucket.reports "$BUCKET" || true
          fi

          # Import CloudFront distribution if it exists
          CF_COMMENT="Naturgy Gas test reports ${REPO_HASH}"
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='${CF_COMMENT}'].Id" \
            --output text 2>/dev/null || echo "")
          if [[ -n "$DIST_ID" && "$DIST_ID" != "None" ]]; then
            terraform import \
              -var="aws_region=${{ steps.clean.outputs.aws_region }}" \
              -var="environment=${ENV}" \
              -var="repo_hash=${REPO_HASH}" \
              aws_cloudfront_distribution.reports "$DIST_ID" || true
          fi

          # Import OAC if it exists
          OAC_NAME="naturgy-gas-reports-oac-${REPO_HASH}"
          OAC_ID=$(aws cloudfront list-origin-access-controls \
            --query "OriginAccessControlList.Items[?Name=='${OAC_NAME}'].Id" \
            --output text 2>/dev/null || echo "")
          if [[ -n "$OAC_ID" && "$OAC_ID" != "None" ]]; then
            terraform import \
              -var="aws_region=${{ steps.clean.outputs.aws_region }}" \
              -var="environment=${ENV}" \
              -var="repo_hash=${REPO_HASH}" \
              aws_cloudfront_origin_access_control.reports "$OAC_ID" || true
          fi

      - name: Terraform Destroy
        working-directory: terraform/reports
        run: |
          terraform destroy -auto-approve \
            -var="aws_region=${{ steps.clean.outputs.aws_region }}" \
            -var="environment=${{ inputs.environment }}" \
            -var="repo_hash=${{ steps.hash.outputs.repo_hash }}"

      - name: Show destruction summary
        run: |
          {
            echo "## 🗑️ Reports Infrastructure Destroyed"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Environment | \`${{ inputs.environment }}\` |"
            echo "| Repo Hash | \`${{ steps.hash.outputs.repo_hash }}\` |"
            echo "| Bucket | \`naturgy-gas-reports-${{ inputs.environment }}-${{ steps.hash.outputs.repo_hash }}\` |"
            echo "| Status | ✅ Destroyed |"
          } >> "$GITHUB_STEP_SUMMARY"
