# ============================================================
# Deploy: Upload Reports to S3
#
# Builds backend (JaCoCo) + frontend (Vitest) test reports and
# publishes them to S3 / CloudFront.
#
# Triggers:
#   - Manually via workflow_dispatch
#   - Automatically after "CI/CD Pipeline" succeeds on main
# ============================================================

name: "Deploy: Upload Reports to S3"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy reports to"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    branches: [main]
    types: [completed]

concurrency:
  group: deploy-reports
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────
  # Job 1: Build backend + frontend, collect report artifacts
  # ──────────────────────────────────────────────────────────
  build-reports:
    name: Build Reports
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Java 17 (temurin, Maven cache)
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4.7.0
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build backend and run unit tests
        working-directory: backend
        run: mvn clean verify -B

      - name: Copy JaCoCo report to reports/jacoco
        run: |
          mkdir -p reports/jacoco
          cp -r backend/target/site/jacoco/. reports/jacoco/

      - name: Set up Node 20 (npm cache)
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Run frontend tests with coverage
        working-directory: frontend
        # vitest writes coverage to ../reports/vitest/ (configured in vitest.config.ts)
        run: npm run test:coverage

      - name: Upload reports artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-reports
          path: reports/
          retention-days: 7

  # ──────────────────────────────────────────────────────────
  # Job 2: Sync reports to S3 and invalidate CloudFront cache
  # ──────────────────────────────────────────────────────────
  upload-reports:
    name: Upload Reports to S3
    runs-on: ubuntu-latest
    needs: build-reports
    steps:
      - name: Download reports artifact
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: test-reports
          path: reports/

      - name: Sanitise AWS region
        id: clean
        run: |
          REGION="$(echo -n "${{ secrets.AWS_REGION }}" | tr -d '[:space:]')"
          echo "::add-mask::$REGION"
          echo "aws_region=$REGION" >> "$GITHUB_OUTPUT"

      - name: Generate repo hash
        id: hash
        run: |
          REPO_HASH=$(echo -n "${{ github.repository }}" | sha256sum | cut -c1-7)
          echo "repo_hash=$REPO_HASH" >> "$GITHUB_OUTPUT"
          echo "Repo hash: $REPO_HASH"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@5579c002bb4778aa43395ef1df492868a9a1c83f # v4.0.2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ steps.clean.outputs.aws_region }}
          role-to-assume: arn:aws:iam::223876296831:role/AWS_223876296831_PoC-Naturgy-IA-TDLC
          role-duration-seconds: 3600
          role-skip-session-tagging: true

      - name: Checkout source (for Terraform)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check if S3 bucket exists
        id: check-bucket
        run: |
          ENV="${{ inputs.environment || 'dev' }}"
          REPO_HASH="${{ steps.hash.outputs.repo_hash }}"
          BUCKET="naturgy-gas-reports-${ENV}-${REPO_HASH}"
          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "✓ Bucket ${BUCKET} exists"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "⚠ Bucket ${BUCKET} not found — will provision infrastructure"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Terraform
        if: steps.check-bucket.outputs.exists == 'false'
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_wrapper: false

      - name: Provision reports infrastructure
        if: steps.check-bucket.outputs.exists == 'false'
        working-directory: terraform/reports
        run: |
          ENV="${{ inputs.environment || 'dev' }}"
          REPO_HASH="${{ steps.hash.outputs.repo_hash }}"
          terraform init
          terraform plan \
            -var="aws_region=${{ steps.clean.outputs.aws_region }}" \
            -var="environment=${ENV}" \
            -var="repo_hash=${REPO_HASH}" \
            -out=tfplan
          terraform apply -auto-approve tfplan
          echo "✓ Infrastructure provisioned successfully"

      - name: Sync reports to S3
        run: |
          ENV="${{ inputs.environment || 'dev' }}"
          REPO_HASH="${{ steps.hash.outputs.repo_hash }}"
          aws s3 sync reports/ "s3://naturgy-gas-reports-${ENV}-${REPO_HASH}" --delete

      - name: Invalidate CloudFront cache
        run: |
          REPO_HASH="${{ steps.hash.outputs.repo_hash }}"
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='Naturgy Gas test reports ${REPO_HASH}'].Id" \
            --output text)
          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/*"

      - name: Print CloudFront URLs in summary
        run: |
          REPO_HASH="${{ steps.hash.outputs.repo_hash }}"
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='Naturgy Gas test reports ${REPO_HASH}'].Id" \
            --output text)
          DOMAIN=$(aws cloudfront get-distribution \
            --id "$DIST_ID" \
            --query "Distribution.DomainName" \
            --output text)
          BASE_URL="https://${DOMAIN}"

          {
            echo "### 📊 Test Reports Published"
            echo ""
            echo "| Report | URL |"
            echo "|--------|-----|"
            echo "| Dashboard | [${BASE_URL}](${BASE_URL}) |"
            echo "| JaCoCo (Backend) | [${BASE_URL}/jacoco/](${BASE_URL}/jacoco/) |"
            echo "| Vitest (Frontend) | [${BASE_URL}/vitest/](${BASE_URL}/vitest/) |"
          } >> "$GITHUB_STEP_SUMMARY"
