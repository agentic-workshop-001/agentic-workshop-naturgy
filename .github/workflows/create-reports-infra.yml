# ============================================================
# Infra: Create Reports S3 + CloudFront
#
# Provisions the S3 bucket and CloudFront distribution used to
# host JaCoCo and Vitest HTML reports.  Idempotent — imports
# an existing S3 bucket before applying so re-runs are safe.
# ============================================================

name: "Infra: Create Reports S3"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: false
        default: "dev"

permissions:
  contents: read

concurrency:
  group: reports-infra
  cancel-in-progress: false

jobs:
  terraform:
    name: Terraform – provision reports infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Sanitise AWS region
        id: clean
        run: |
          REGION="$(echo -n "${{ secrets.AWS_REGION }}" | tr -d '[:space:]')"
          echo "::add-mask::$REGION"
          echo "aws_region=$REGION" >> "$GITHUB_OUTPUT"

      - name: Generate repo hash
        id: hash
        run: |
          REPO_HASH=$(echo -n "${{ github.repository }}" | sha256sum | cut -c1-7)
          echo "repo_hash=$REPO_HASH" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@5579c002bb4778aa43395ef1df492868a9a1c83f # v4.0.2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ steps.clean.outputs.aws_region }}
          role-to-assume: arn:aws:iam::223876296831:role/AWS_223876296831_PoC-Naturgy-IA-TDLC
          role-duration-seconds: 3600
          role-skip-session-tagging: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform/reports
        run: terraform init

      - name: Import existing S3 bucket if present (idempotent)
        working-directory: terraform/reports
        env:
          REPO_HASH: ${{ steps.hash.outputs.repo_hash }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          BUCKET="naturgy-gas-reports-${ENVIRONMENT}-${REPO_HASH}"
          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "Bucket $BUCKET already exists — importing into Terraform state"
            terraform import \
              -var="repo_hash=${REPO_HASH}" \
              -var="environment=${ENVIRONMENT}" \
              -var="aws_region=${{ steps.clean.outputs.aws_region }}" \
              aws_s3_bucket.reports "$BUCKET" || true
          else
            echo "Bucket $BUCKET does not exist — will be created by apply"
          fi

      - name: Terraform plan
        working-directory: terraform/reports
        env:
          REPO_HASH: ${{ steps.hash.outputs.repo_hash }}
        run: |
          terraform plan \
            -var="aws_region=${{ steps.clean.outputs.aws_region }}" \
            -var="environment=${{ inputs.environment }}" \
            -var="repo_hash=${REPO_HASH}" \
            -out=tfplan

      - name: Terraform apply
        working-directory: terraform/reports
        run: terraform apply -auto-approve tfplan

      - name: Show Reports URL in summary
        working-directory: terraform/reports
        env:
          REPO_HASH: ${{ steps.hash.outputs.repo_hash }}
        run: |
          BUCKET=$(terraform output -raw reports_bucket_name)
          DIST_ID=$(terraform output -raw cloudfront_distribution_id)
          URL=$(terraform output -raw reports_url)
          {
            echo "## 📊 Reports Infrastructure"
            echo ""
            echo "| Resource | Value |"
            echo "|----------|-------|"
            echo "| S3 Bucket | \`$BUCKET\` |"
            echo "| CloudFront Distribution ID | \`$DIST_ID\` |"
            echo "| Reports URL | $URL |"
          } >> "$GITHUB_STEP_SUMMARY"
