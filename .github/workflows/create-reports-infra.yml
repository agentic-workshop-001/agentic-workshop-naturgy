# ============================================================
# Infra: Create Reports S3
#
# Provisions the S3 bucket + CloudFront distribution used to
# serve JaCoCo and Vitest HTML reports.  Idempotent — imports
# an existing bucket before planning so re-runs are safe.
# ============================================================

name: "Infra: Create Reports S3"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: false
        default: "dev"

permissions:
  contents: read

concurrency:
  group: reports-infra
  cancel-in-progress: false

jobs:
  terraform:
    name: Terraform – provision reports infrastructure
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform/reports

    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Sanitise AWS region
        id: clean
        run: |
          REGION="$(echo -n "${{ secrets.AWS_REGION }}" | tr -d '[:space:]')"
          echo "::add-mask::$REGION"
          echo "aws_region=$REGION" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@5579c002bb4778aa43395ef1df492868a9a1c83f # v4.0.2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ steps.clean.outputs.aws_region }}
          role-to-assume: arn:aws:iam::223876296831:role/AWS_223876296831_PoC-Naturgy-IA-TDLC
          role-duration-seconds: 3600
          role-skip-session-tagging: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init

      - name: Import existing S3 bucket (idempotent)
        run: |
          BUCKET="naturgy-gas-reports-${{ inputs.environment }}"
          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            terraform import \
              -var="aws_region=${{ steps.clean.outputs.aws_region }}" \
              -var="environment=${{ inputs.environment }}" \
              aws_s3_bucket.reports "$BUCKET" || true
          fi

      - name: Terraform plan
        run: |
          terraform plan \
            -var="aws_region=${{ steps.clean.outputs.aws_region }}" \
            -var="environment=${{ inputs.environment }}" \
            -out=tfplan

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan

      - name: Show Reports URL in summary
        run: |
          BUCKET=$(terraform output -raw reports_bucket_name)
          DIST_ID=$(terraform output -raw cloudfront_distribution_id)
          URL=$(terraform output -raw reports_url)
          {
            echo "## 📊 Reports Infrastructure"
            echo ""
            echo "| Resource | Value |"
            echo "|----------|-------|"
            echo "| S3 Bucket | \`$BUCKET\` |"
            echo "| CloudFront Distribution ID | \`$DIST_ID\` |"
            echo "| Reports URL | [$URL]($URL) |"
          } >> "$GITHUB_STEP_SUMMARY"
