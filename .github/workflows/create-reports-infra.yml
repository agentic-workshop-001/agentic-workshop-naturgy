# ============================================================
# Create Reports Infrastructure
#
# Provisions the S3 + CloudFront infrastructure required to
# host test reports publicly via HTTPS.
# Run once (or re-run safely — it is idempotent).
# ============================================================

name: Create Reports Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: false
        default: "dev"
        type: choice
        options: [dev, staging, prod]

concurrency:
  group: reports-infra-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform – Reports Infrastructure
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform/reports

    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Sanitise AWS region
        id: clean
        run: |
          REGION="$(echo -n "${{ secrets.AWS_REGION }}" | tr -d '[:space:]')"
          echo "::add-mask::$REGION"
          echo "aws_region=$REGION" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@5579c002bb4778aa43395ef1df492868a9a1c83f # v4.0.2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ steps.clean.outputs.aws_region }}
          role-to-assume: arn:aws:iam::223876296831:role/AWS_223876296831_PoC-Naturgy-IA-TDLC
          role-duration-seconds: 3600
          role-skip-session-tagging: true

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2

      - name: Terraform Init
        run: terraform init

      - name: Import existing S3 bucket (idempotent)
        env:
          BUCKET_NAME: naturgy-gas-reports-${{ github.event.inputs.environment || 'dev' }}
        run: |
          if aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            terraform import \
              -var="environment=${{ github.event.inputs.environment || 'dev' }}" \
              aws_s3_bucket.reports "$BUCKET_NAME" || true
          fi

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="environment=${{ github.event.inputs.environment || 'dev' }}" \
            -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Print reports URL
        run: terraform output -raw reports_url
